    <!-- SCRIPT AUTOMATICO PER IDENTIFICAZIONE -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const fileInput = document.getElementById("input_8");
        const nomeSci = document.getElementById("input_9");
        const nomeCom = document.getElementById("input_7");
        const affid = document.getElementById("input_12");
        const aller = document.getElementById("input_13");

        if (!fileInput) {
          console.warn("Campo file input_8 non trovato.");
          return;
        }

        fileInput.addEventListener("change", function () {
          const file = fileInput.files[0];
          if (!file) return;

          nomeSci.value = "Identificazione in corso...";
          nomeCom.value = "";
          affid.value = "";
          aller.value = "";

          const reader = new FileReader();
          reader.onloadend = async () => {
            const base64 = reader.result.split(",")[1];
            try {
              const res = await fetch("/.netlify/functions/plantnet-identify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ imageBase64: base64 })
              });
              const data = await res.json();
              nomeSci.value = data.scientificName || "";
              nomeCom.value = data.commonName || "";
              affid.value = data.reliability || "";
              aller.value = data.allergenicity || "N/D";
            } catch (e) {
              nomeSci.value = "Errore durante l'identificazione";
              console.error(e);
