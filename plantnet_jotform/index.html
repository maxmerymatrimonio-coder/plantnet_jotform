<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Modulo di identificazione piante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>

<!-- 🔹 Embed del tuo modulo Jotform -->
<div id="jotform-container" style="max-width: 800px; margin: 0 auto;">
  <script type="text/javascript"
    src="https://form.jotform.com/jsform/253044075525049">
  </script>
</div>

<!-- 🔹 Pulsante per identificare la specie -->
<div style="max-width: 800px; margin: 30px auto; text-align: center;">
  <button id="identify-btn"
    style="background-color:#2563eb;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;">
    🌿 Identifica Specie
  </button>
</div>

<!-- 🔹 Script per identificazione automatica -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const identifyButton = document.getElementById("identify-btn");

  identifyButton.addEventListener("click", async function () {
    const fileInput = document.querySelector('input[type="file"]');
    if (!fileInput || !fileInput.files.length) {
      alert("Carica una foto prima di identificare la pianta 🌿");
      return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = async function () {
      const base64 = reader.result.split(",")[1];
      identifyButton.disabled = true;
      identifyButton.textContent = "🔍 Identificazione in corso...";

      try {
        const response = await fetch("/.netlify/functions/plantnet-identify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imageBase64: base64 })
        });

        const data = await response.json();

        // Compila i campi del modulo
        const nomeComune = document.querySelector("#input_7");
        const nomeScientifico = document.querySelector("#input_9");
        const affidabilita = document.querySelector("#input_12");
        const allergenicita = document.querySelector("#input_13");

        if (nomeComune) nomeComune.value = data.commonName || "";
        if (nomeScientifico) nomeScientifico.value = data.scientificName || "";
        if (affidabilita) affidabilita.value = data.reliability || "";
        if (allergenicita) allergenicita.value = data.allergenicity || "";

        identifyButton.textContent = "✅ Identificazione completata";
      } catch (err) {
        console.error(err);
        alert("Errore durante l'identificazione. Riprova.");
        identifyButton.textContent = "🌿 Identifica Specie";
      } finally {
        identifyButton.disabled = false;
      }
    };
    reader.readAsDataURL(file);
  });
});
</script>

</body>
</html>
