<!-- 🔹 Script di collegamento con PlantNet -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const identifyButton = document.getElementById("identify-btn");
  const fileInput = document.getElementById("input_8");

  if (!identifyButton || !fileInput) {
    console.warn("⚠️ Impossibile trovare identify-btn o input_8");
    return;
  }

  identifyButton.addEventListener("click", async function (e) {
    e.preventDefault();

    const files = fileInput.files;
    if (!files || files.length === 0) {
      alert("Carica almeno una foto per identificare la pianta 🌿");
      return;
    }

    const file = files[0];
    const reader = new FileReader();

    reader.onload = async function () {
      const base64Data = reader.result.split(",")[1];
      try {
        identifyButton.textContent = "🔍 Identificazione in corso...";
        identifyButton.disabled = true;

        const response = await fetch("/.netlify/functions/plantnet-identify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imageBase64: base64Data }),
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || "Errore sconosciuto");

        // ✅ Compila i campi Jotform
        document.getElementById("input_7").value = data.commonName || "";
        document.getElementById("input_9").value = data.scientificName || "";
        document.getElementById("input_12").value = data.reliability || "";
        document.getElementById("input_13").value = data.allergenicity || "";

        identifyButton.textContent = "✅ Identificazione completata";
      } catch (err) {
        console.error(err);
        alert("Errore durante l'identificazione della pianta. Riprova.");
        identifyButton.textContent = "Identifica Specie";
      } finally {
        identifyButton.disabled = false;
      }
    };

    reader.readAsDataURL(file);
  });
});
</script>
