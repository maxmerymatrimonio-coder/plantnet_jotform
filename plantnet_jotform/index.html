<li class="form-line form-line-column form-col-1" data-type="control_fileupload" id="id_8">
  <label class="form-label form-label-top" id="label_8" for="input_8" aria-hidden="false">
    File Upload
  </label>

  <div id="cid_8" class="form-input-wide" data-layout="full">
    <!-- Contenitore flessibile: upload a sinistra, pulsante a destra -->
    <div style="display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; justify-content: space-between;">

      <!-- 📸 BLOCCO UPLOAD ORIGINALE JOTFORM -->
      <div class="jfQuestion-fields" data-wrapper-react="true" style="flex: 1 1 60%;">
        <div class="jfField isFilled">
          <div class="jfUpload-wrapper">
            <div class="jfUpload-container">
              <div class="jfUpload-button-container">
                <div class="jfUpload-button" aria-hidden="true" tabindex="0" style="display:none" data-version="v2">
                  Sfoglia File
                  <div class="jfUpload-heading forDesktop">Trascina e Rilascia i file qui</div>
                  <div class="jfUpload-heading forMobile">Scegli un file</div>
                </div>
              </div>
            </div>
            <div class="jfUpload-files-container">
              <div class="validate[multipleUpload]">
                <input
                  type="file"
                  id="input_8"
                  name="q8_fileUpload[]"
                  multiple=""
                  class="form-upload-multiple"
                  data-imagevalidate="yes"
                  data-file-accept="pdf, doc, docx, xls, xlsx, csv, txt, rtf, html, zip, mp3, wma, mpg, flv, avi, jpg, jpeg, png, gif"
                  data-limit-file-size="Yes"
                  data-file-maxsize="10854"
                  data-file-minsize="0"
                  data-file-limit="2"
                  data-component="fileupload"
                  aria-label="Sfoglia File"
                />
              </div>
            </div>
          </div>
          <div data-wrapper-react="true"></div>
        </div>
        <span style="display:none" class="cancelText">Cancel</span>
        <span style="display:none" class="ofText">of</span>
      </div>

      <!-- 🌿 PULSANTE IDENTIFICA SPECIE A DESTRA -->
      <div style="flex: 0 0 auto; text-align: right; min-width: 180px;">
        <button type="button" id="identify-btn" class="form-submit-button">
          Identifica Specie
        </button>
      </div>

    </div> <!-- fine flex container -->
  </div>
</li>
